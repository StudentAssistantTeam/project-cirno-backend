spring:
  application:
    name: project-cirno-backend
  datasource:
    url: jdbc:sqlite:cirno.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
  ai:
    openai:
      api-key: ${MIMO_API_KEY:placeholder}
      base-url: https://api.xiaomimimo.com
      chat:
        options:
          model: mimo-v2-flash
          max-tokens: 2048

app:
  jwt:
    secret: Y2lybm8tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctMjAyNg==
    expiration-ms: 86400000
